<!-- Dashboard Section - Overview with stats cards -->
<div id="section-dashboard" class="content-section">
    <div class="section-card">
        <div class="section-header">
            <h3 class="section-title">
                <span class="section-title-icon">📊</span>
                Overview
            </h3>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
            <div class="glass-panel" style="padding: 1.25rem; text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 0.5rem;">🔄</div>
                <div id="stat-active" style="font-size: 1.5rem; font-weight: 600; color: var(--accent-primary);">0</div>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Active Conversions</div>
            </div>
            {% if role == 'admin' %}
            <div class="glass-panel" style="padding: 1.25rem; text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 0.5rem;">📋</div>
                <div id="stat-pending" style="font-size: 1.5rem; font-weight: 600; color: var(--status-warning);">0
                </div>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Pending Requests</div>
            </div>
            <div class="glass-panel" style="padding: 1.25rem; text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 0.5rem;">💬</div>
                <div id="stat-tickets" style="font-size: 1.5rem; font-weight: 600; color: var(--status-info);">0</div>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Open Discussions</div>
            </div>
            {% endif %}
            <div class="glass-panel" style="padding: 1.25rem; text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 0.5rem;">✅</div>
                <div id="stat-complete" style="font-size: 1.5rem; font-weight: 600; color: var(--status-success);">0
                </div>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Completed Today</div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="section-card">
        <div class="section-header">
            <h3 class="section-title">
                <span class="section-title-icon">⚡</span>
                Quick Actions
            </h3>
        </div>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button class="btn btn--primary" onclick="showSection('convert')">
                {% if role == 'admin' %}🚀 Start New Conversion{% else %}📝 Request Conversion{% endif %}
            </button>
            <button class="btn btn--secondary" onclick="showSection('queue')">
                🔄 View Queue
            </button>
        </div>
    </div>
</div>
