<!-- Admin: Pending Requests Section -->
<div id="section-requests" class="content-section hidden">
    <div class="section-card">
        <div class="section-header">
            <h3 class="section-title">
                <span class="section-title-icon">📋</span>
                Pending Requests
            </h3>
        </div>
        <div id="requests-list" style="display: grid; gap: 0.75rem;">
            <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <div class="empty-state-title">No pending requests</div>
                <div class="empty-state-description">New requests will appear here</div>
            </div>
        </div>
    </div>
</div>

<!-- Admin: Tickets/Discussions Section -->
<div id="section-tickets" class="content-section hidden">
    <div class="section-card">
        <div class="section-header">
            <h3 class="section-title">
                <span class="section-title-icon">💬</span>
                Active Discussions
            </h3>
        </div>
        <div id="tickets-list" style="display: grid; gap: 0.75rem;">
            <div class="empty-state">
                <div class="empty-state-icon">💭</div>
                <div class="empty-state-title">No active discussions</div>
                <div class="empty-state-description">Discussions with users will appear here</div>
            </div>
        </div>
    </div>
</div>
